<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Detained Engineer | Profile</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
font-family: Arial, sans-serif;
margin:0;
padding:0;
color:white;
text-align:center;
overflow-x:hidden;
}

/* Blurred background */

.bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:url("profile.jpeg") center/cover no-repeat;
filter:blur(3px) brightness(0.4);
transform:scale(1.2);
z-index:-2;
}

/* dark overlay */

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.55);
z-index:-1;
}

.container{
max-width:420px;
margin:auto;
padding:40px 20px;
}

/* profile */

.profile-wrapper{
position:relative;
display:inline-block;
}

.profile-img{
width:120px;
height:120px;
object-fit:cover;
border:2px solid white;
}

/* music button */

.music-btn{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:50px;
height:50px;
border-radius:50%;
border:none;
background:rgba(0,0,0,0.55);
color:white;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
}

.music-btn i{
font-size:18px;
}

/* links */

.links a{
display:flex;
align-items:center;
justify-content:center;
gap:10px;
text-decoration:none;
background:white;
padding:15px;
margin:3px 0;
font-weight:bold;
transition:0.25s;
}

.links a.spotify{color:#1DB954;}
.links a.apple{color:black;}
.links a.ytmusic{color:#ff4e4e;}
.links a.amazon{color:#00A8E1;}
.links a.instagram{color:#E1306C;}
.links a.youtube{color:#f25353;}

.links a:hover{
transform:scale(1.03);
}

.footer{
margin-top:30px;
font-size:12px;
opacity:0.7;
}

</style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<audio id="bgmusic" autoplay loop>
<source src="intro.mp3" type="audio/mpeg">
</audio>

<div class="container">

<div class="profile-wrapper">

<button id="musicToggle" class="music-btn">
<i class="fas fa-play"></i>
</button>

<img src="profile.jpeg" class="profile-img">

</div>

<h2>Detained Engineer</h2>

<p style="margin-top:-5px;">Artist</p>
<p style="margin-top:-10px;">Tum Hi Ho - The Past</p>

<div class="links">

<a class="spotify" href="https://open.spotify.com/track/6VZcSZPMuAIAXH6kcqgGDh">
<i class="fab fa-spotify"></i> Spotify
</a>

<a class="apple" href="https://music.apple.com/us/song/tum-hi-ho/1880040349">
<i class="fab fa-apple"></i> Apple Music
</a>

<a class="ytmusic" href="https://music.youtube.com/playlist?list=OLAK5uy_lTAWjlc1TMwsuyTktdCKY9cCFbinP8w3Q">
<i class="fas fa-music"></i> YouTube Music
</a>

<a class="amazon" href="https://music.amazon.in/albums/B0GPLM3B46">
<i class="fa-brands fa-amazon"></i> Amazon Music
</a>

<a class="instagram" href="https://www.instagram.com/detained_engineer_/">
<i class="fab fa-instagram"></i> Instagram
</a>

<a class="youtube" href="https://www.youtube.com/@DetainedEngineer">
<i class="fab fa-youtube"></i> YouTube
</a>

</div>

<div class="footer">
© Made with ❤️ by Niraj
</div>

</div>

<script>

const music = document.getElementById("bgmusic");
const toggleBtn = document.getElementById("musicToggle");
const icon = toggleBtn.querySelector("i");

window.addEventListener("load", () => {
music.volume = 0.5;
music.play().then(()=>{
icon.className="fas fa-pause";
}).catch(()=>{});
});

toggleBtn.onclick = () => {

if(music.paused){
music.play();
icon.className="fas fa-pause";
}else{
music.pause();
icon.className="fas fa-play";
}

};

</script>

</body>
</html>
